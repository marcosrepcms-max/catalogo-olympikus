<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Disponibilidades · Olympikus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --bg:#f6f7fb; --card:#ffffff; --card2:#f1f5f9;
      --text:#0f172a; --muted:#64748b; --line:#e2e8f0;
      --accent:#7db800; --accent-light:#ccff00;
      --brand:#16a34a;
      --shadow:0 4px 24px rgba(15,23,42,.08);
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:Inter,system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar{ width:6px; height:6px; }
    ::-webkit-scrollbar-track{ background:transparent; }
    ::-webkit-scrollbar-thumb{ background:#cbd5e1; border-radius:999px; }

    /* Cards grid */
    .cards-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }

    /* Indicador de progresso da listagem */
    .pagination-status{
      display:flex;align-items:center;justify-content:center;gap:8px;
      margin:24px auto 8px;
      padding:10px 18px;
      max-width:fit-content;
      font-size:12px; font-weight:700;
      color:var(--muted);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:999px;
      box-shadow:0 1px 4px rgba(15,23,42,.04);
      transition:opacity .2s;
    }
    .pagination-status::before{
      content:''; display:inline-block;
      width:6px; height:6px; border-radius:50%;
      background:var(--accent);
    }
    .pagination-status.complete::before{ background:#16a34a; }
    .pagination-status.complete{ color:#16a34a; border-color:rgba(22,163,74,.25); background:rgba(22,163,74,.06); }
    .pagination-status .ps-bold{ color:var(--text); font-weight:800; }
    .pagination-status.complete .ps-bold{ color:#16a34a; }
    @media (max-width:480px){
      .pagination-status{ font-size:11px; padding:8px 14px; }
    }

    /* Card produto */
    .prod-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      overflow:hidden;
      transition:transform .18s, box-shadow .18s, border-color .18s;
      position:relative;
      box-shadow:var(--shadow);
    }
    .prod-card:hover{
      transform:translateY(-3px);
      box-shadow:0 12px 32px rgba(15,23,42,.12);
      border-color:#94a3b8;
    }

    /* Coração */
    .btn-fav{
      position:absolute; top:10px; left:10px; z-index:10;
      width:32px; height:32px; border-radius:50%;
      background:rgba(255,255,255,.85); backdrop-filter:blur(4px);
      border:1px solid #e2e8f0; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all .15s; box-shadow:0 2px 8px rgba(0,0,0,.08);
    }
    .btn-fav:hover{ background:#fff; border-color:#94a3b8; }
    .btn-fav i{ font-size:14px; color:#94a3b8; transition:all .15s; }
    .btn-fav.ativo i{ color:#ef4444; }
    .btn-fav.ativo{ border-color:#fca5a5; background:#fff1f2; }
    .prod-card.selecionado{ border-color:var(--accent); box-shadow:0 0 0 2px rgba(125,184,0,.2); }

    /* Lupa */
    .btn-zoom{
      position:absolute; top:10px; right:10px; z-index:10;
      width:32px; height:32px; border-radius:50%;
      background:rgba(255,255,255,.85); backdrop-filter:blur(4px);
      border:1px solid #e2e8f0; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all .15s; box-shadow:0 2px 8px rgba(0,0,0,.08);
    }
    .btn-zoom:hover{ background:#fff; border-color:#94a3b8; }
    .btn-zoom i{ font-size:13px; color:#64748b; }

    /* Imagem */
    .card-img{ aspect-ratio:1/1; background:#f8fafc; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; border-bottom:1px solid #e2e8f0; }
    .card-img img{ width:100%; height:100%; object-fit:contain; }
    .no-img{ color:#94a3b8; text-align:center; padding:24px; }

    /* Chips */
    .chip{ display:inline-flex; align-items:center; gap:4px; border-radius:999px; padding:3px 10px; font-size:11px; font-weight:700; }
    .chip-ua{ background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; }
    .chip-oly{ background:#f0fdf4; color:#15803d; border:1px solid #bbf7d0; }

    /* Filtros */
    .filter-pill{ display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:7px 16px; font-size:12px; font-weight:700; border:1px solid var(--line); background:var(--card); color:var(--muted); cursor:pointer; transition:all .12s; white-space:nowrap; }
    .filter-pill.active{ background:var(--accent); color:#fff; border-color:var(--brand); }
    .filter-pill:hover:not(.active){ border-color:#94a3b8; color:var(--text); }

    /* Campanhas (tabela especial) — fade-in suave + pulso 2x ao aparecer */
    .campanha-pill{
      opacity: 0;
      animation: campanhaFadeIn .35s ease-out forwards, campanhaPulse 1.2s ease-out .35s 2;
    }
    @keyframes campanhaFadeIn{
      0%   { opacity:0; transform: translateY(-4px); }
      100% { opacity:1; transform: translateY(0); }
    }
    @keyframes campanhaPulse{
      0%, 100% { box-shadow: 0 0 0 0 var(--pulse-color, rgba(125,184,0,0)); }
      50%      { box-shadow: 0 0 0 6px var(--pulse-color-strong, rgba(125,184,0,.18)); }
    }

    /* Header */
    .main-header{ background:rgba(255,255,255,.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:50; box-shadow:0 1px 8px rgba(15,23,42,.06); }
    .filters-bar{
      position:sticky;
      top: 64px;
      z-index:40;
      background: rgba(247,248,250,.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom:1px solid var(--line);
      margin:0 -16px;
      padding:10px 16px;
    }
    @media(min-width:640px){ .filters-bar{ top:72px; margin:0 -24px; padding:10px 24px; } }

    /* Modal zoom */
    .modal-zoom{ position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.8); display:flex; align-items:center; justify-content:center; padding:24px; }
    .modal-zoom-inner{ max-width:600px; max-height:90vh; display:flex; align-items:center; justify-content:center; position:relative; }
    .modal-zoom img{ max-width:100%; max-height:80vh; object-fit:contain; border-radius:16px; box-shadow:0 24px 64px rgba(0,0,0,.5); }

    /* Botão PDF flutuante */
    .fab-pdf{
      position:fixed; bottom:24px; right:24px; z-index:100;
      background:var(--accent); color:#fff;
      border:none; border-radius:999px; cursor:pointer;
      padding:14px 24px; font-size:14px; font-weight:800;
      display:flex; align-items:center; gap:8px;
      box-shadow:0 8px 32px rgba(125,184,0,.35);
      transition:all .15s; transform:translateY(80px); opacity:0;
    }
    .fab-pdf.visivel{ transform:translateY(0); opacity:1; }
    .fab-pdf:hover{ background:#6aa100; }

    /* Selecionar todos */
    .sel-bar{ display:none; align-items:center; gap:10px; padding:8px 0; }
    .sel-bar.visivel{ display:flex; }

    /* Toast */
    .toast-wrap{ position:fixed; top:18px; right:18px; display:flex; flex-direction:column; gap:10px; z-index:9999; pointer-events:none; }
    .toast{ pointer-events:auto; min-width:220px; border-radius:14px; padding:10px 16px; font-size:13px; font-weight:700; }
    .toast-success{ background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; }
    .toast-error{ background:#fef2f2; color:#b91c1c; border:1px solid #fecaca; }
    .toast-info{ background:#f8fafc; color:#0f172a; border:1px solid #e2e8f0; }

    /* Grade por numeração */
    .grade-grid{ display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
    .grade-pill{ display:inline-flex; flex-direction:column; align-items:center; background:#f1f5f9; border:0.5px solid #e2e8f0; border-radius:8px; padding:3px 7px; min-width:30px; }
    .grade-pill .gp-num{ font-size:10px; font-weight:600; color:#64748b; line-height:1.2; }
    .grade-pill .gp-qty{ font-size:11px; font-weight:800; color:#0f172a; line-height:1.2; }

    /* Spinner */
    @keyframes spin{ to{ transform:rotate(360deg); } }
    .spin{ animation:spin 1s linear infinite; }
    /* ═══ SACOLA / FAB ═══════════════════════════════════════════════════ */
    .fab-cart{
      position:fixed; bottom:24px; right:24px; z-index:50;
      width:auto; height:54px; padding:0 22px; border-radius:999px;
      background:var(--accent); color:#fff; border:none;
      display:none; align-items:center; gap:10px;
      font-weight:800; font-size:14px; cursor:pointer;
      box-shadow:0 6px 24px rgba(0,0,0,.18);
      transition:transform .15s, box-shadow .2s;
    }
    .fab-cart:hover{ transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,0,0,.22); }
    .fab-cart i{ font-size:18px; }
    .fab-cart .badge{
      background:#0f172a; color:#fff;
      font-size:11px; font-weight:900;
      padding:2px 8px; border-radius:999px;
    }

    /* Botão "+" no card */
    .card-add-btn{
      position:absolute; bottom:10px; right:10px; z-index:2;
      width:32px; height:32px; border-radius:50%;
      background:var(--accent); color:#fff; border:none;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.2);
      transition:transform .15s;
      font-size:16px; font-weight:900;
    }
    .card-add-btn:hover{ transform:scale(1.12); }
    .card-add-btn.added{ background:#22c55e; }

    /* Modal genérico */
    .modal-bg{
      position:fixed; inset:0; z-index:100;
      background:rgba(15,23,42,.45);
      display:flex; align-items:flex-end; justify-content:center;
      backdrop-filter:blur(2px);
    }
    .modal-bg.hidden{ display:none; }
    @media(min-width:640px){ .modal-bg{ align-items:center; } }
    .modal-sheet{
      background:#fff; border-radius:22px 22px 0 0;
      width:100%; max-width:760px; max-height:90vh;
      display:flex; flex-direction:column;
      box-shadow:0 -8px 32px rgba(0,0,0,.18);
      overflow:hidden;
    }
    @media(min-width:640px){ .modal-sheet{ border-radius:22px; max-height:88vh; } }
    .modal-head{
      flex:0 0 auto; padding:16px 20px;
      border-bottom:1px solid var(--line);
      display:flex; align-items:center; gap:12px;
    }
    .modal-head h2{ font-size:16px; font-weight:900; color:var(--text); margin:0; flex:1; }
    .modal-head .btn-x{
      background:none; border:none; color:var(--muted);
      font-size:22px; cursor:pointer; padding:0 4px; line-height:1;
    }
    .modal-body{ flex:1; overflow-y:auto; padding:16px 20px; }
    .modal-foot{
      flex:0 0 auto; padding:14px 20px;
      border-top:1px solid var(--line);
      background:#f8fafc;
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    }
    .modal-foot .info{ font-size:13px; color:var(--muted); flex:1; }
    .modal-foot .info b{ color:var(--text); font-weight:900; }

    /* Item da sacola */
    .cart-item{
      background:#fff; border:1px solid var(--line);
      border-radius:12px; padding:12px; margin-bottom:10px;
    }
    .cart-item-head{
      display:flex; align-items:center; gap:10px; margin-bottom:10px;
    }
    .cart-item-title{ font-size:13px; font-weight:900; color:var(--text); }
    .cart-item-meta{ font-size:11px; color:var(--muted); margin-top:1px; }
    .cart-item-total{
      background:var(--accent-light); color:var(--text);
      font-size:12px; font-weight:900;
      padding:4px 10px; border-radius:999px;
      min-width:32px; text-align:center;
    }
    .cart-btn-del{
      background:#fee2e2; color:#dc2626; border:1px solid #fecaca;
      width:26px; height:26px; border-radius:50%;
      font-size:14px; font-weight:900; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }
    .cart-grade-grid{
      display:grid; grid-template-columns:repeat(auto-fill, minmax(78px, 1fr));
      gap:6px; margin-bottom:10px;
    }
    .cart-grade-box{
      border:1px solid var(--line); border-radius:8px;
      padding:6px 4px; text-align:center; background:#f8fafc;
      transition:border-color .2s, background .2s;
    }
    .cart-grade-box.pending{
      border-color:#fbbf24; background:#fffbeb;
    }
    .cart-grade-tam{ font-size:12px; font-weight:900; color:var(--text); }
    .cart-grade-disp{ font-size:10px; color:var(--muted); margin:2px 0 4px; }
    .cart-grade-ctrl{
      display:flex; align-items:center; justify-content:center; gap:2px;
    }
    .cart-grade-ctrl button{
      width:22px; height:22px; border-radius:6px;
      border:1px solid var(--line); background:#fff; color:var(--text);
      cursor:pointer; font-weight:900; font-size:13px;
      display:flex; align-items:center; justify-content:center;
    }
    .cart-grade-ctrl button:disabled{ opacity:.3; cursor:not-allowed; }
    .cart-grade-ctrl input{
      width:36px; text-align:center; font-weight:900;
      border:1px solid var(--line); border-radius:6px;
      padding:2px 0; font-size:12px;
      -moz-appearance:textfield;
    }
    .cart-grade-ctrl input::-webkit-outer-spin-button,
    .cart-grade-ctrl input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
    .cart-item-fields{
      display:grid; grid-template-columns:1fr 1fr; gap:8px;
    }
    .cart-item-fields label{
      display:flex; flex-direction:column; gap:3px;
      font-size:11px; font-weight:700; color:var(--muted);
    }
    .cart-item-fields label.invalid span{ color:#dc2626; }
    .cart-item-fields input{
      padding:7px 10px; border:1px solid var(--line); border-radius:8px;
      font-size:13px; background:#fff;
    }
    .cart-item-fields label.invalid input{ border-color:#dc2626; }

    /* Modal de export */
    .export-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .export-grid .full{ grid-column:1 / -1; }
    .export-grid label{
      display:flex; flex-direction:column; gap:4px;
      font-size:11px; font-weight:800; color:var(--muted);
    }
    .export-grid label.req::after{ content:' *'; color:#dc2626; }
    .export-grid input, .export-grid select{
      padding:9px 12px; border:1px solid var(--line); border-radius:8px;
      font-size:13px; background:#fff;
    }
    .export-grid .invalid{ border-color:#dc2626!important; background:#fef2f2; }

    /* Botões do footer */
    .btn-primary{
      background:var(--accent); color:#fff; border:none;
      padding:10px 18px; border-radius:999px;
      font-weight:800; font-size:13px; cursor:pointer;
      display:inline-flex; align-items:center; gap:8px;
    }
    .btn-primary:hover{ opacity:.92; }
    .btn-ghost{
      background:#fff; color:var(--muted); border:1px solid var(--line);
      padding:9px 16px; border-radius:999px;
      font-weight:700; font-size:12px; cursor:pointer;
    }
    .btn-ghost:hover{ background:#f1f5f9; color:var(--text); }
    .btn-danger-ghost{
      background:#fff; color:#dc2626; border:1px solid #fecaca;
      padding:9px 14px; border-radius:999px;
      font-weight:700; font-size:12px; cursor:pointer;
    }
  </style>
</head>
<body>

<div id="toastWrap" class="toast-wrap"></div>

<!-- Modal Zoom -->
<div id="modalZoom" class="modal-zoom hidden" onclick="fecharZoom()">
  <div class="modal-zoom-inner" onclick="event.stopPropagation()">
    <button onclick="fecharZoom()" style="position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center">✕</button>
    <img id="zoomImg" src="" alt="">
  </div>
</div>

<!-- Header -->
<header class="main-header px-4 py-3 sm:px-6">
  <div class="max-w-[1400px] mx-auto flex items-center justify-between gap-4 flex-wrap">
    <div class="flex items-center gap-3">
      <a href="https://marcosrepcms-max.github.io/Catalogo-Olympikus/?abrir=marca&app=disponibilidades" style="color:var(--muted);display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;text-decoration:none" class="hover:text-slate-900" title="Voltar e trocar marca">
        <i class="fa-solid fa-arrow-left text-xs"></i> Trocar marca
      </a>
      <div class="w-px h-5" style="background:var(--line)"></div>
      <!-- Identidade da marca ativa -->
      <div class="flex items-center gap-2">
        <div id="brandLogo" style="width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden">
          <img id="brandLogoImg" src="" alt="" style="width:100%;height:100%;object-fit:contain">
        </div>
        <div>
          <div class="text-xs font-bold" style="color:var(--muted)">Catálogo</div>
          <div class="text-lg font-extrabold leading-tight" id="brandName">—</div>
        </div>
      </div>
    </div>

    <!-- Busca -->
    <div class="flex items-center gap-2 rounded-full px-4 py-2 flex-1 max-w-sm" style="background:var(--card);border:1px solid var(--line)">
      <i class="fa-solid fa-magnifying-glass text-sm" style="color:var(--muted)"></i>
      <input id="searchInput" class="bg-transparent text-sm outline-none w-full" style="color:var(--text)" placeholder="Buscar produto, artigo ou cor..." oninput="applyFilters()">
      <button id="btnClearSearch" class="hidden" onclick="limparBusca()" style="color:var(--muted);background:none;border:none;cursor:pointer;font-size:14px">✕</button>
    </div>

    <!-- Contador + PDF -->
    <div class="flex items-center gap-2">
      <div class="text-xs font-semibold" style="color:var(--muted)" id="countLabel">Carregando...</div>
      <button onclick="gerarPDF()" id="btnPDF" class="fab-pdf" style="position:static;transform:none;opacity:1;display:none">
        <i class="fa-solid fa-file-pdf text-sm"></i>
        PDF <span id="pdfCount" class="bg-slate-900 text-[var(--accent)] text-[10px] font-extrabold rounded-full px-1.5 py-0.5">0</span>
      </button>
    </div>
  </div>
</header>

<main class="max-w-[1400px] mx-auto px-4 sm:px-6 py-6">

  <!-- Filtros (sticky) -->
  <div class="filters-bar flex flex-wrap items-center gap-2 mb-4">
    <!-- Sem pills de marca: a marca já vem da URL -->
    <!-- Filtros de tabela especial — só os que existem na marca atual -->
    <div id="filtrosTabela" class="flex flex-wrap gap-2"></div>
    <!-- Filtros de categoria -->
    <div id="filtrosCategoria" class="flex flex-wrap gap-2"></div>
    <div class="ml-auto flex items-center gap-2">
      <!-- Selecionar todos -->
      <div class="sel-bar" id="selBar">
        <label class="flex items-center gap-2 cursor-pointer text-xs font-bold" style="color:var(--muted)">
          <input type="checkbox" id="chkTodos" onchange="toggleSelecionarTodos(this.checked)" style="accent-color:var(--accent);width:15px;height:15px">
          Selecionar todos
        </label>
        <span class="text-xs font-semibold" style="color:var(--accent)" id="selCount"></span>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div id="loadingState" class="text-center py-24">
    <i class="fa-solid fa-circle-notch fa-spin text-3xl" style="color:var(--accent)"></i>
    <div class="mt-4 text-sm font-semibold" style="color:var(--muted)">Carregando disponibilidades...</div>
  </div>

  <!-- Empty -->
  <div id="emptyState" class="hidden text-center py-24">
    <i class="fa-solid fa-box-open text-4xl" style="color:var(--muted)"></i>
    <div class="mt-4 text-sm font-semibold" style="color:var(--muted)">Nenhum produto encontrado.</div>
  </div>

  <!-- Cards -->
  <div id="cardsWrap" class="cards-grid hidden"></div>

  <!-- Indicador de progresso da listagem (Mostrando X de Y) -->
  <div id="paginationStatus" class="pagination-status hidden" aria-live="polite">
    <span id="paginationStatusText"></span>
  </div>

</main>

<!-- FAB PDF -->
<button class="fab-pdf" id="fabPDF" onclick="gerarPDF()">
  <i class="fa-solid fa-file-pdf"></i>
  Gerar PDF <span id="fabCount" class="bg-slate-900 text-[var(--accent)] text-[10px] font-extrabold rounded-full px-1.5 py-0.5">0</span>
</button>

<!-- ── FAB Sacola ──────────────────────────────────────────────────────── -->
<button id="cartFab" class="fab-cart" onclick="abrirSacola()" title="Abrir sacola">
  <i class="fa-solid fa-bag-shopping"></i>
  Sacola <span id="cartBadge" class="badge">0</span>
</button>

<!-- ── Modal Sacola ───────────────────────────────────────────────────── -->
<div id="cartModal" class="modal-bg hidden" onclick="if(event.target===this)fecharSacola()">
  <div class="modal-sheet">
    <div class="modal-head">
      <i class="fa-solid fa-bag-shopping" style="color:var(--accent);font-size:18px"></i>
      <h2>Sacola — <span id="brandNameCart">—</span></h2>

function fixEncoding(s){

    .replace(/\u00c3\u00aa/g,'ª').replace(/\u00c3\u00ba/g,'º')
    .replace(/\u00c3\u00a7/g,'ç').replace(/\u00c3\u00a3/g,'ã')

// ── CARREGAR DADOS ────────────────────────────────────────────────────────────
async function loadData(){
  try{
    // Carrega disponibilidades + lista de ocultos em paralelo
    const [dispRes, ocultosRes] = await Promise.all([
      fetch(WORKER_URL, {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ action:'getDisponibilidades' })
      }),
      fetch(WORKER_URL, {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ action:'getOcultosDisp' })
      })
    ]);
    if(!dispRes.ok) throw new Error('Falha ao carregar');
    const itens = await dispRes.json();
    const ocultosArr = ocultosRes.ok ? await ocultosRes.json() : [];
    const ocultosSet = new Set(Array.isArray(ocultosArr) ? ocultosArr : []);
    const ocultarKey = (i) => `${String(i.artigo||'').toUpperCase()}|${String(i.cor||'').toUpperCase()}`;

    STATE.itens = itens
      .filter(i => !i._oculto)
      .filter(i => !ocultosSet.has(ocultarKey(i)))
      // Filtra pela marca ativa (vem da URL) — produtos de outras marcas não entram
      .filter(i => String(i.marca||'').trim().toLowerCase() === MARCA_ATIVA)
      .map(i => ({ ...i, prevFat: fixEncoding(i.prevFat) }));
    renderFiltrosTabela();
    renderFiltrosCategoria();
    applyFilters();
    $('loadingState').classList.add('hidden');
  }catch(err){
    console.error(err);
    $('loadingState').innerHTML = `<i class="fa-solid fa-triangle-exclamation text-3xl" style="color:#f87171"></i><div class="mt-4 text-sm font-semibold" style="color:#f87171">Erro ao carregar. Tente novamente.</div>`;
  }
}

// ── FILTROS ───────────────────────────────────────────────────────────────────
// As "pills de campanha" (tabela especial) só aparecem quando o usuário
// já interagiu com uma CATEGORIA. Animação fade-in suave.
function renderFiltrosTabela(){
  const wrap = $('filtrosTabela');
  if(!wrap) return;

  // Estado inicial (nenhuma categoria ativa AINDA, e não há filtro de tabela)
  // → pills ficam ocultas
  if(!STATE.filtroCategoria && !STATE.filtroTabela && !wrap.dataset.acionado){
    wrap.innerHTML = '';
    wrap.classList.remove('campanhas-visiveis');
    return;
  }

  // Marca como "já acionado" (usuário clicou em categoria pelo menos 1x)
  wrap.dataset.acionado = '1';

  // Pool de itens: filtra pela categoria ativa, ou usa tudo se sem categoria
  let pool = STATE.itens;
  if(STATE.filtroCategoria){
    pool = STATE.itens.filter(i => grupoDeCategoria(i.categoria) === STATE.filtroCategoria);
  }

  const codigos = [...new Set(pool.map(i => i.codigoTabela).filter(Boolean))].sort();

  if(!codigos.length){
    // Nenhuma campanha disponível para esta categoria
    wrap.innerHTML = '';
    wrap.classList.remove('campanhas-visiveis');
    return;
  }

  wrap.innerHTML = codigos.map(cod => {
    const active = STATE.filtroTabela === `tabela_${cod}`;
    return `<button class="filter-pill campanha-pill${active?' active':''}" data-tabela="tabela_${cod}" onclick="setTabela('tabela_${cod}')" style="border-color:#d1d5db;color:#374151">
      <i class="fa-solid fa-tag" style="font-size:10px"></i> ${cod}
    </button>`;
  }).join('');
  wrap.classList.add('campanhas-visiveis');
}

// Define os GRUPOS de categoria — fundem categorias relacionadas
// regex bate em UPPERCASE sem acentos (a normalização cuida)
const GRUPOS_CATEGORIA = [
  { id:'calcados',    label:'Calçados',   emoji:'👟', match:/TEN|CALCAD|CHINEL|SAND/ },
  { id:'vestuario',   label:'Vestuário',  emoji:'👕', match:/VEST|CAMIS|SHORT|BERMUD|CAL[CÇ]A|REGATA|JAQUET|MOLET|MEIA/ },
  { id:'acessorios',  label:'Acessórios', emoji:'🛍️', match:/ACES|MOCHIL|BOLSA|BONE/ }
];

// Remove acentos para casar regex de forma robusta
function semAcento(s){
  return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// Dado o valor cru de item.categoria, retorna o id do grupo (ou '' se não bater)
function grupoDeCategoria(catRaw){
  const c = semAcento(String(catRaw||'').trim().toUpperCase());
  if(!c) return '';
  for(const g of GRUPOS_CATEGORIA){
    if(g.match.test(c)) return g.id;
  }
  return ''; // sem grupo definido = não aparece nas pills
}

// Gera dinamicamente as pills de categoria (1 por grupo, só se houver itens)
function renderFiltrosCategoria(){
  const wrap = $('filtrosCategoria');
  if(!wrap) return;

  // Quais grupos têm pelo menos 1 produto?
  const gruposPresentes = new Set();
  for(const item of STATE.itens){
    const gid = grupoDeCategoria(item.categoria);
    if(gid) gruposPresentes.add(gid);
  }

  const visiveis = GRUPOS_CATEGORIA.filter(g => gruposPresentes.has(g.id));
  if(!visiveis.length){ wrap.innerHTML = ''; return; }

  wrap.innerHTML = visiveis.map(g => `
    <button class="filter-pill" data-categoria="${g.id}" onclick="setCategoria('${g.id}')" style="border-color:#fde68a;color:#92400e;background:#fef9c3">
      <span style="font-size:13px;line-height:1">${g.emoji}</span> ${g.label}
    </button>`).join('');
}

// Filtro de MARCA (sempre 1 ativo: todos/ua/oly)
// Filtro de TABELA especial (toggle — clicar 2x desativa)
function setTabela(t){
  STATE.filtroTabela = (STATE.filtroTabela === t) ? '' : t;
  document.querySelectorAll('[data-tabela]').forEach(b => b.classList.toggle('active', b.dataset.tabela === STATE.filtroTabela));
  applyFilters();
}

// Filtro de CATEGORIA (toggle — clicar 2x desativa)
// Trocar/desativar categoria zera o filtro de campanha e re-renderiza as pills
function setCategoria(c){
  STATE.filtroCategoria = (STATE.filtroCategoria === c) ? '' : c;
  STATE.filtroTabela = ''; // reseta campanha ativa
  document.querySelectorAll('[data-categoria]').forEach(b => b.classList.toggle('active', b.dataset.categoria === STATE.filtroCategoria));
  renderFiltrosTabela(); // recalcula pills (categoria atual ou todas)
  applyFilters();
}

}

function limparBusca(){
  STATE.search = '';
  $('searchInput').value = '';
  $('btnClearSearch').classList.add('hidden');
  applyFilters();
}

function applyFilters(){
  const q = ($('searchInput')?.value || '').toLowerCase().trim();
  STATE.search = q;
  $('btnClearSearch').classList.toggle('hidden', !q);

  // Marca já foi filtrada no loadData — aqui só restam tabela, categoria e busca.
  STATE.filtrados = STATE.itens
    // 1) Filtro de TABELA especial
    .filter(item => {
      const t = STATE.filtroTabela;
      if(!t) return true;
      if(t.startsWith('tabela_')) return (item.codigoTabela||'') === t.replace('tabela_','');
      return true;
    })
    // 2) Filtro de CATEGORIA (via grupo)
    .filter(item => {
      if(!STATE.filtroCategoria) return true;
      return grupoDeCategoria(item.categoria) === STATE.filtroCategoria;
    })
    // 3) Busca livre
    .filter(item => {
      if(!q) return true;
      return `${item.descricao} ${item.artigo} ${item.cor} ${item.linha} ${item.empresa} ${item.codigoTabela||''}`.toLowerCase().includes(q);
    });

  $('countLabel').textContent = `${STATE.filtrados.length} produto${STATE.filtrados.length!==1?'s':''}`;
  renderCards();
}

// Cria/posiciona a sentinela usada pelo IntersectionObserver
function ensureScrollSentinel(wrap){
  let sentinel = $('cardsSentinel');
  if(!sentinel){
    sentinel = document.createElement('div');
    sentinel.id = 'cardsSentinel';
    sentinel.style.cssText = 'grid-column:1/-1;height:1px;';
  }
  wrap.appendChild(sentinel); // sempre move pro final do wrap
  return sentinel;
}

// Atualiza o indicador "Mostrando X de Y produtos"
function updatePaginationStatus(){
  const el = $('paginationStatus');
  const txt = $('paginationStatusText');
  if(!el || !txt) return;
  const total = STATE.filtrados.length;
  const shown = STATE.rendered;
  if(total === 0){
    el.classList.add('hidden');
    el.classList.remove('complete');
    return;
  }
  el.classList.remove('hidden');
  if(shown >= total){
    el.classList.add('complete');
    txt.innerHTML = `Todos os <span class="ps-bold">${total}</span> produto${total!==1?'s':''} carregado${total!==1?'s':''} ✓`;
  } else {
    el.classList.remove('complete');
    txt.innerHTML = `Mostrando <span class="ps-bold">${shown}</span> de <span class="ps-bold">${total}</span> · role para ver mais`;
  }
}

// Renderiza o próximo lote (até pageSize itens)
function renderNextBatch(){
  const wrap = $('cardsWrap');
  if(!wrap) return;
  const start = STATE.rendered;
  const end = Math.min(start + STATE.pageSize, STATE.filtrados.length);
  if(start >= end) return;

  const frag = document.createDocumentFragment();
  for(let i = start; i < end; i++){
    frag.appendChild(buildCardHtml(STATE.filtrados[i]));
  }
  // Insere antes da sentinela pra ela continuar sendo o último filho
  const sentinel = $('cardsSentinel');
  if(sentinel) wrap.insertBefore(frag, sentinel);
  else wrap.appendChild(frag);
  STATE.rendered = end;

  // Se não há mais itens, desconecta o observer
  if(STATE.rendered >= STATE.filtrados.length && STATE.io){
    STATE.io.disconnect();
    STATE.io = null;
    if(sentinel) sentinel.remove();
  }
  updatePaginationStatus();
}

function renderCards(){
  const wrap = $('cardsWrap');
  wrap.innerHTML = '';
  STATE.rendered = 0;
  if(STATE.io){ STATE.io.disconnect(); STATE.io = null; }

  if(!STATE.filtrados.length){
    wrap.classList.add('hidden');
    $('emptyState').classList.remove('hidden');
    updatePaginationStatus();
    return;
  }
  $('emptyState').classList.add('hidden');
  wrap.classList.remove('hidden');

  // Selecionar todos bar
  $('selBar').classList.toggle('visivel', STATE.itens.length > 0);

  // Primeiro lote
  ensureScrollSentinel(wrap);
  renderNextBatch();

  // Observer para lotes seguintes
  if(STATE.rendered < STATE.filtrados.length){
    const sentinel = $('cardsSentinel');
    STATE.io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if(e.isIntersecting) renderNextBatch(); });
    }, { rootMargin: '600px 0px' }); // dispara 600px antes de aparecer
    if(sentinel) STATE.io.observe(sentinel);
  }

  atualizarFAB();
  sincronizarChkTodos();
}

function toggleFav(key, btn){
  const isSel = STATE.selecionados.has(key);
  if(isSel){ STATE.selecionados.delete(key); }
  else      { STATE.selecionados.add(key); }

  // Atualizar visual do card
  const card = document.querySelector(`[data-key="${key}"]`);
  if(card){
    card.classList.toggle('selecionado', !isSel);
    if(btn){
      btn.classList.toggle('ativo', !isSel);
      btn.querySelector('i').className = `fa-${!isSel?'solid':'regular'} fa-heart`;
    }
  }
  atualizarFAB();
  sincronizarChkTodos();
}

function toggleSelecionarTodos(checked){
  STATE.filtrados.forEach(item => {
    const key = prodKey(item);
    if(checked){ STATE.selecionados.add(key); }
    else        { STATE.selecionados.delete(key); }

  renderCards();
}

function sincronizarChkTodos(){
  const chk = $('chkTodos');
  if(!chk) return;
  const total = STATE.filtrados.length;
  const sel   = STATE.filtrados.filter(i => STATE.selecionados.has(prodKey(i))).length;
  chk.checked       = total > 0 && sel === total;
  chk.indeterminate = sel > 0 && sel < total;
  $('selCount').textContent = sel > 0 ? `${sel} selecionado${sel>1?'s':''}` : '';
}

async function imageUrlToDataUrl(url){
  if(!url) return '';
  try{
    const res = await fetch(url, { cache:'no-store' });
    if(!res.ok) return '';
    const blob = await res.blob();
    return await new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = ()=> resolve(String(reader.result||''));
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }catch(_){ return ''; }
}

async function loadImgForPdfCrop(dataUrl){
  return new Promise(resolve=>{
    if(!dataUrl){ resolve(null); return; }
    const img = new Image();
    img.onload = ()=>{
      try{
        const c = document.createElement('canvas');
        c.width = img.naturalWidth; c.height = img.naturalHeight;
        const ctx = c.getContext('2d');
        ctx.drawImage(img,0,0);
        const idata = ctx.getImageData(0,0,c.width,c.height);
        const d=idata.data, W=c.width, H=c.height, thr=240;
        let minX=W,minY=H,maxX=0,maxY=0;
        for(let y=0;y<H;y++) for(let x=0;x<W;x++){
          const i=(y*W+x)*4;
          if(d[i+3]<10||( d[i]>thr&&d[i+1]>thr&&d[i+2]>thr)) continue;
          if(x<minX)minX=x; if(x>maxX)maxX=x;
          if(y<minY)minY=y; if(y>maxY)maxY=y;
        }
        if(maxX<=minX||maxY<=minY){ resolve({dataUrl:c.toDataURL('image/png'),w:W,h:H}); return; }
        const px=Math.ceil((maxX-minX)*.04), py=Math.ceil((maxY-minY)*.04);
        const cx=Math.max(0,minX-px), cy=Math.max(0,minY-py);
        const cw=Math.min(W,maxX+px)-cx, ch=Math.min(H,maxY+py)-cy;
        const c2=document.createElement('canvas');
        c2.width=cw; c2.height=ch;
        c2.getContext('2d').drawImage(c,cx,cy,cw,ch,0,0,cw,ch);
        resolve({dataUrl:c2.toDataURL('image/png'),w:cw,h:ch});
      }catch(e){ resolve(null); }
    };
    img.onerror=()=>resolve(null);
    img.src=dataUrl;
  });
}

// ── GERAR PDF ─────────────────────────────────────────────────────────────────
async function gerarPDF(){
  const selecionados = STATE.filtrados.filter(i => STATE.selecionados.has(prodKey(i)));
  if(!selecionados.length){ showToast('Selecione ao menos um produto.','info'); return; }

  const fab = $('fabPDF');
  const prev = fab.innerHTML;
  fab.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Gerando...';
  fab.disabled = true;

  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'landscape', unit:'pt', format:'a4', compress:true });
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();

    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    const dateStr = `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

    const margin   = 28;
    const contentW = pageW - margin*2;
    const headerH  = 38;
    const bodyY    = headerH + 10;
    const bodyH    = pageH - bodyY - 10;
    const cardH    = Math.floor((bodyH-8)/2);

    // Cores — verde limão para disponibilidades
    const C = {
      green:  [125, 184, 0],
      text:   [15, 23, 42],
      muted:  [100, 116, 139],
      border: [226, 232, 240],
      bg:     [248, 250, 252],
      white:  [255, 255, 255],
    };
    const sc = (rgb, type='text') => {
      if(type==='fill')      doc.setFillColor(...rgb);
      else if(type==='draw') doc.setDrawColor(...rgb);
      else                   doc.setTextColor(...rgb);
    };

    function drawHeader(){
      sc(C.green,'fill');
      doc.rect(0,0,pageW,headerH,'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(13);
      doc.setTextColor(255,255,255);
      doc.text('Catálogo Olympikus — Disponibilidades', margin, 24);
      doc.setFont('helvetica','normal'); doc.setFontSize(9);
      doc.setTextColor(220,255,150);
      doc.text(dateStr, pageW-margin, 24, {align:'right'});
      sc(C.text);
    }

    const imgAreaW  = 560;
    const infoGap   = 14;
    const infoAreaX = margin + imgAreaW + infoGap;
    const infoAreaW = contentW - imgAreaW - infoGap;

    async function drawCard(item, cardY){
      sc(C.border,'draw'); doc.setLineWidth(0.4);
      sc(C.bg,'fill');
      doc.roundedRect(margin, cardY, contentW, cardH, 6, 6, 'FD');

      // Área da imagem
      const ip=6, ibX=margin+ip, ibY=cardY+ip;
      const ibW=imgAreaW-ip*2, ibH=cardH-ip*2;
      sc(C.white,'fill'); sc(C.border,'draw');
      doc.roundedRect(ibX,ibY,ibW,ibH,4,4,'FD');

      const corSafePdf = String(item.cor || '').replace(/\//g, '_').toUpperCase();
      if(item.artigo && corSafePdf){
        const rawData = await imageUrlToDataUrl(`${IMG_BASE}${item.artigo}_${corSafePdf}.jpg`);
        const img = await loadImgForPdfCrop(rawData);
        if(img?.dataUrl){
          const targetH = ibH*0.85;
          const scale   = targetH/img.h;
          const drawW   = img.w*scale;
          const drawH   = targetH;
          const drawX   = ibX+(ibW-drawW)/2;
          const drawY   = ibY+(ibH-drawH)/2;
          doc.addImage(img.dataUrl,'PNG',drawX,drawY,drawW,drawH,undefined,'FAST');
        }
      }

      const tx = infoAreaX;
      let ty = cardY + 18;

      // Descrição
      sc(C.text);
      doc.setFont('helvetica','bold'); doc.setFontSize(13);
      const nameLines = doc.splitTextToSize(String(item.descricao||''), infoAreaW-4);
      doc.text(nameLines.slice(0,2), tx, ty);
      ty += nameLines.slice(0,2).length*15 + 6;

      // Artigo
      doc.setFont('helvetica','normal'); doc.setFontSize(9);
      sc(C.muted); doc.text('Artigo:', tx, ty);
      sc(C.text); doc.text(String(item.artigo||'—'), tx+38, ty);
      ty += 13;

      // Cor
      sc(C.muted); doc.text('Cor:', tx, ty);
      sc(C.text); doc.text(String(item.cor||'—'), tx+24, ty);
      ty += 13;

      // Empresa
      sc(C.muted); doc.text('Empresa:', tx, ty);
      sc(C.text); doc.text(String(item.empresa||'—'), tx+44, ty);
      ty += 14;

      // Divisor
      sc(C.border,'draw'); doc.setLineWidth(0.4);
      doc.line(tx, ty, tx+infoAreaW, ty);
      ty += 10;

      // Boxes: MKP | PDV | Custo
      const boxGap=6, boxW=(infoAreaW-boxGap*2)/3, boxH=32;

      // MKP (ou Prev.Fat se não tiver tabela especial)
      sc(C.white,'fill'); sc(C.border,'draw'); doc.setLineWidth(0.4);
      doc.roundedRect(tx, ty, boxW, boxH, 4,4,'FD');
      doc.setFont('helvetica','bold'); doc.setFontSize(6.5); sc(C.muted);
      if(item.codigoTabela && item.mkp){
        doc.text('MKP', tx+6, ty+8);
        doc.setFont('helvetica','bold'); doc.setFontSize(11); sc(C.text);
        doc.text(String(item.mkp), tx+6, ty+22);
      } else {
        doc.text('PREV. FATURAMENTO', tx+6, ty+8);
        doc.setFont('helvetica','bold'); doc.setFontSize(9); sc(C.text);
        doc.text(fixEncoding(item.prevFat||'—'), tx+6, ty+22);
      }

      // PDV
      const bx2 = tx+boxW+boxGap;
      sc(C.white,'fill'); sc(C.border,'draw');
      doc.roundedRect(bx2, ty, boxW, boxH, 4,4,'FD');
      doc.setFont('helvetica','bold'); doc.setFontSize(6.5); sc(C.muted);
      doc.text('PDV', bx2+6, ty+8);
      doc.setFont('helvetica','bold'); doc.setFontSize(14); sc(C.green);
      doc.text(`R$ ${Number(item.pdv||0).toFixed(2)}`, bx2+6, ty+24);

      // Custo (ou T.Geral se não tiver tabela especial)
      const bx3 = bx2+boxW+boxGap;
      sc(C.white,'fill'); sc(C.border,'draw');
      doc.roundedRect(bx3, ty, boxW, boxH, 4,4,'FD');
      doc.setFont('helvetica','bold'); doc.setFontSize(6.5); sc(C.muted);
      if(item.codigoTabela && item.custo){
        doc.text('CUSTO', bx3+6, ty+8);
        doc.setFont('helvetica','bold'); doc.setFontSize(11); sc(C.text);
        doc.text(`R$ ${Number(item.custo).toFixed(2)}`, bx3+6, ty+22);
      } else {
        doc.text('T. GERAL', bx3+6, ty+8);
        doc.setFont('helvetica','bold'); doc.setFontSize(14); sc(C.text);
        doc.text(Number(item.totalGeral||0).toLocaleString('pt-BR'), bx3+6, ty+24);
      }

      ty += boxH+10;

      // Grade — células igual ao repasses
      const grade = item.grade || {};
      const gradeEntries = Object.entries(grade).filter(([,v])=>Number(v)>0);
      if(gradeEntries.length){
        doc.setFont('helvetica','bold'); doc.setFontSize(7);
        sc(C.muted); doc.text('GRADE DISPONÍVEL', tx, ty);
        ty += 9;
        const cellW=34, cellH=24, cellGap=4;
        const perRow = Math.floor(infoAreaW/(cellW+cellGap));
        let cx=tx, col=0;
        for(const [size,qty] of gradeEntries){
          if(col>=perRow){ col=0; cx=tx; ty+=cellH+cellGap; }
          sc(C.border,'draw'); sc(C.white,'fill');
          doc.roundedRect(cx, ty, cellW, cellH, 3,3,'FD');
          doc.setFont('helvetica','bold'); doc.setFontSize(7); sc(C.muted);
          const sStr=String(size);
          doc.text(sStr, cx+(cellW-doc.getTextWidth(sStr))/2, ty+9);
          doc.setFontSize(9.5); sc(C.green);
          const qStr=String(qty);
          doc.text(qStr, cx+(cellW-doc.getTextWidth(qStr))/2, ty+20);
          cx+=cellW+cellGap; col++;
        }
      }
    }

    for(let i=0; i<selecionados.length; i+=2){
      if(i>0) doc.addPage();
      drawHeader();
      await drawCard(selecionados[i], bodyY);
      if(selecionados[i+1]) await drawCard(selecionados[i+1], bodyY+cardH+8);
    }

    const now2 = new Date();
    const fname = `disponibilidades_${now2.getFullYear()}${pad(now2.getMonth()+1)}${pad(now2.getDate())}.pdf`;
    doc.save(fname);
    showToast(`PDF gerado com ${selecionados.length} produto(s)!`, 'success');
  }catch(err){
    console.error(err);
    showToast('Erro ao gerar PDF.', 'error');
  }finally{
    fab.innerHTML = prev;
    fab.disabled = false;
  }
}

// Identifica categoria especial (meias/acessórios/calçados)
function isSockCategory(cat){ return /MEIA|MEIAS/i.test(String(cat||'')); }
function isAccessoryCategory(cat){ return /ACES|MOCHIL|BOLSA|BONE/i.test(semAcento(String(cat||'')).toUpperCase()); }
function isFootwearCategory(cat){ return /TEN|CALCAD|CHINEL|SAND/i.test(semAcento(String(cat||'')).toUpperCase()); }

// Detecta coluna de meia (faixa) com base no nome/categoria
function detectSockColumn(item){
  const txt = (item.produto || item.descricao || '').toUpperCase();
  if(/33\/38|33-38/.test(txt)) return '33/38';
  if(/39\/44|39-44/.test(txt)) return '39/44';
  // Default: tenta usar o primeiro tamanho da grade
  if(item.grade){
    const keys = Object.keys(item.grade);
    if(keys.length === 1) return keys[0];
  }
  return null;
}

// Calcula o total da grade do pedido
function getItemTotalQty(it){
  if(!it.gradePedido) return 0;
  return Object.values(it.gradePedido).reduce((s,v) => s + (Number(v)||0), 0);
}

// Calcula qtd de caixas (calçados em múltiplos de 6, demais = total)
function calcQtdCaixas(it, total){
  if(isFootwearCategory(it.categoria)) return Math.ceil(total / 6);
  return total > 0 ? 1 : 0;
}

// Parse de condição de pagamento → prazo médio + número de parcelas
function parsePaymentInfo(payment){
  if(!payment) return { prazoMedio:'', parcelas:'' };
  // Novo formato: "Z01 - A VISTA" | "Z04 - 28 D" | "Z19 - 28/56 D" | "Z29 - 21/49/77 D"
  if(/A\s*VISTA/i.test(payment)) return { prazoMedio: 0, parcelas: 1 };
  // Captura a sequência de dias entre o "-" e o "D"
  const m = payment.match(/-\s*([\d/]+)\s*D\b/i);
  if(!m) return { prazoMedio:'', parcelas:'' };
  const dias = m[1].split('/').map(Number).filter(n => !isNaN(n));
  if(!dias.length) return { prazoMedio:'', parcelas:'' };
  const media = Math.round(dias.reduce((a,b)=>a+b,0) / dias.length);
  return { prazoMedio: media, parcelas: dias.length };
}

// Extrai 1ª palavra/letra ("S: Sim" → "S")
function extractLeadingToken(str){
  if(!str) return '';
  const m = String(str).match(/^([^:\s]+)/);
  return m ? m[1] : str;
}
function extractLeadingCode(str, len){
  if(!str) return '';
  const m = String(str).match(/^(\S+)/);
  if(!m) return str;
  return len ? m[1].slice(0, len) : m[1];
}

// Chave única do item no carrinho
function cartKey(item){
  return `${String(item.artigo||'').toUpperCase()}|${String(item.cor||'').toUpperCase()}`;
}

// Carrega sacola do localStorage
function loadCartFromStorage(){
  try{
    const raw = localStorage.getItem(CART_LS_KEY);
    if(!raw) return;
    const arr = JSON.parse(raw);
    if(Array.isArray(arr)){
      for(const it of arr){
        if(it && it.key) STATE.cart.set(it.key, it);
      }
    }
  }catch(e){ console.warn('Falha carregar sacola:', e); }
}

// Persiste sacola no localStorage
function saveCartToStorage(){
  try{
    const arr = [...STATE.cart.values()];
    localStorage.setItem(CART_LS_KEY, JSON.stringify(arr));
  }catch(e){ console.warn('Falha salvar sacola:', e); }
}

// Adiciona item à sacola (sem alterar grade ainda)
function cartAdd(produtoArtigo, produtoCor){
  // Acha o item original
  const item = STATE.itens.find(i =>
    String(i.artigo||'').toUpperCase() === produtoArtigo.toUpperCase() &&
    String(i.cor||'').toUpperCase()    === produtoCor.toUpperCase()
  );
  if(!item){ showToast('Produto não encontrado','error'); return; }
  const k = cartKey(item);
  if(STATE.cart.has(k)){
    showToast(`${item.descricao} já está na sacola`, 'info');
    abrirSacola();
    return;
  }
  // Cria entrada no carrinho com gradePedido vazia
  STATE.cart.set(k, {
    key:        k,
    artigo:     item.artigo,
    codigo:     item.artigo,           // alias usado no buildOrderExportRows
    cor:        item.cor,
    corCodigo:  item.cor,
    descricao:  item.descricao,
    produto:    item.descricao,        // alias
    categoria:  item.categoria,
    linha:      item.linha,
    genero:     item.genero,
    gradeDisp:  { ...(item.grade || {}) }, // disponibilidade copiada
    gradePedido:{},                        // qtds pedidas
    dataDesejada: '',
    pedidoCliente: ''
  });
  saveCartToStorage();
  atualizarFabContador();
  showToast(`${item.descricao} adicionado`, 'success');
}

// Remove item da sacola
function cartRemove(key){
  STATE.cart.delete(key);
  saveCartToStorage();
  atualizarFabContador();
  renderCartUI();
}

// Atualiza qtd de um tamanho no pedido. delta = +1 ou -1 (ou número)
function cartUpdateQty(key, tam, delta){
  const it = STATE.cart.get(key);
  if(!it) return;
  const atual = Number(it.gradePedido[tam] || 0);
  const disp  = Number(it.gradeDisp[tam]   || 0);
  let novo = atual + Number(delta);
  if(novo < 0) novo = 0;
  if(novo > disp) novo = disp; // limita ao disponível
  if(novo === 0) delete it.gradePedido[tam];
  else it.gradePedido[tam] = novo;
  saveCartToStorage();
  // Atualiza só a linha do produto (mais rápido que rerender geral)
  renderCartItem(key);
  atualizarFabResumo();
}

// Set absoluto (input direto)
function cartSetQty(key, tam, val){
  const it = STATE.cart.get(key);
  if(!it) return;
  const disp = Number(it.gradeDisp[tam] || 0);
  let v = Number(val) || 0;
  if(v < 0) v = 0;
  if(v > disp) v = disp;
  if(v === 0) delete it.gradePedido[tam];
  else it.gradePedido[tam] = v;
  saveCartToStorage();
  renderCartItem(key);
  atualizarFabResumo();
}

function cartSetField(key, field, val){
  const it = STATE.cart.get(key);
  if(!it) return;
  it[field] = val;
  saveCartToStorage();
}

function cartClearAll(){
  if(!STATE.cart.size) return;
  if(!confirm('Limpar toda a sacola?')) return;
  STATE.cart.clear();
  saveCartToStorage();
  atualizarFabContador();
  renderCartUI();
}

// ── FAB (botão flutuante) ───────────────────────────────────────────────────
function atualizarFabContador(){
  const n = STATE.cart.size;
  const fab = $('cartFab');
  const badge = $('cartBadge');
  if(!fab || !badge) return;
  if(n > 0){
    fab.style.display = 'flex';
    badge.textContent = n;
  } else {
    fab.style.display = 'none';
  }
}

function atualizarFabResumo(){
  // Atualiza o resumo de total dentro do modal se aberto
  const el = $('cartResumoTotal');
  if(!el) return;
  let total = 0;
  for(const it of STATE.cart.values()) total += getItemTotalQty(it);
  el.textContent = total;
}

// ── RENDER DA SACOLA ────────────────────────────────────────────────────────
function abrirSacola(){
  if(STATE.cart.size === 0){
    showToast('Sacola vazia', 'info');
    return;
  }
  $('cartModal').classList.remove('hidden');
  renderCartUI();
}
function fecharSacola(){ $('cartModal').classList.add('hidden'); }

function renderCartUI(){
  const wrap = $('cartItems');
  if(!wrap) return;
  if(STATE.cart.size === 0){
    wrap.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">Sacola vazia.</div>';
    atualizarFabResumo();
    return;
  }
  wrap.innerHTML = [...STATE.cart.values()].map(it => cartItemHtml(it)).join('');
  atualizarFabResumo();
}

function renderCartItem(key){
  const node = document.querySelector(`[data-cart-key="${CSS.escape(key)}"]`);
  if(!node) return;
  const it = STATE.cart.get(key);
  if(!it){ node.remove(); return; }
  node.outerHTML = cartItemHtml(it);
}

// HTML de 1 item na sacola
function cartItemHtml(it){
  // Linha das grades: tamanhos da disponibilidade
  const tamanhos = Object.keys(it.gradeDisp).sort((a,b) => {
    const aN = !isNaN(Number(a)), bN = !isNaN(Number(b));
    if(aN && !bN) return 1;
    if(!aN && bN) return -1;
    if(aN && bN) return Number(a) - Number(b);
    const ord = ['PP','P','M','G','GG','XG','XXG','U'];
    const ia=ord.indexOf(a), ib=ord.indexOf(b);
    if(ia!==-1 && ib!==-1) return ia-ib;
    return a.localeCompare(b);
  });

  const gradesHtml = tamanhos.map(t => {
    const disp = Number(it.gradeDisp[t] || 0);
    const ped  = Number(it.gradePedido[t] || 0);
    const restante = disp - ped;
    const pendente = ped === 0;
    return `
      <div class="cart-grade-box ${pendente?'pending':''}">
        <div class="cart-grade-tam">${safeHtml(t)}</div>
        <div class="cart-grade-disp">${restante}/${disp}</div>
        <div class="cart-grade-ctrl">
          <button onclick="cartUpdateQty('${safeHtml(it.key)}','${safeHtml(t)}',-1)" ${ped===0?'disabled':''}>−</button>
          <input type="number" value="${ped}" min="0" max="${disp}" onchange="cartSetQty('${safeHtml(it.key)}','${safeHtml(t)}',this.value)">
          <button onclick="cartUpdateQty('${safeHtml(it.key)}','${safeHtml(t)}',1)" ${restante===0?'disabled':''}>+</button>
        </div>
      </div>`;
  }).join('');

  const totalIt = getItemTotalQty(it);
  const corDisplay = String(it.cor||'').replace(/_/g,'/');
  const chavesPendentes = !it.dataDesejada;

  return `
    <div class="cart-item" data-cart-key="${safeHtml(it.key)}">
      <div class="cart-item-head">
        <div style="flex:1;min-width:0">
          <div class="cart-item-title">${safeHtml(it.descricao)}</div>
          <div class="cart-item-meta">${safeHtml(it.artigo)} · ${safeHtml(corDisplay)} · ${safeHtml(it.categoria||'')}</div>
        </div>
        <div class="cart-item-total">${totalIt}</div>
        <button class="cart-btn-del" onclick="cartRemove('${safeHtml(it.key)}')" title="Remover">×</button>
      </div>
      <div class="cart-grade-grid">${gradesHtml}</div>
      <div class="cart-item-fields">
        <label class="${chavesPendentes?'invalid':''}">
          <span>Data desejada *</span>
          <input type="date" value="${safeHtml(it.dataDesejada)}" onchange="cartSetField('${safeHtml(it.key)}','dataDesejada',this.value)">
        </label>
        <label>
          <span>Pedido do cliente</span>
          <input type="text" value="${safeHtml(it.pedidoCliente)}" placeholder="opcional" onchange="cartSetField('${safeHtml(it.key)}','pedidoCliente',this.value)">
        </label>
      </div>
    </div>`;
}

function abrirExport(){
  if(STATE.cart.size === 0){ showToast('Sacola vazia','info'); return; }
  populateExportForm();
  $('exportModal').classList.remove('hidden');
}
function fecharExport(){ $('exportModal').classList.add('hidden'); }

// Carrega defaults + cfg salva (sem dados do cliente)
function loadExportCfg(){
  try{
    const raw = localStorage.getItem(CFG_LS_KEY);
    if(!raw) return { ...ORDER_EXPORT_DEFAULTS };
    const parsed = JSON.parse(raw) || {};
    // Limpa dados de cliente — sempre começa em branco
    delete parsed.clientCode;
    delete parsed.payment;
    delete parsed.campaign;
    delete parsed.pedidoCliente;
    return { ...ORDER_EXPORT_DEFAULTS, ...parsed };
  }catch(e){ return { ...ORDER_EXPORT_DEFAULTS }; }
}
function saveExportCfg(cfg){
  try{ localStorage.setItem(CFG_LS_KEY, JSON.stringify(cfg||{})); }catch(e){}
}

function populateExportForm(){
  const cfg = loadExportCfg();

  // Comissionista — agora é select
  const comSel = $('oxCommission');
  comSel.innerHTML = '<option value="">— Selecione —</option>' +
    ORDER_COMMISSION_OPTIONS.map(c => {
      const v = c.codigo;
      const label = `${c.codigo} – ${c.nome}`;
      return `<option value="${safeHtml(v)}"${v===cfg.commission?' selected':''}>${safeHtml(label)}</option>`;
    }).join('');

  $('oxClientCode').value = cfg.clientCode || '';

  // Pagamento — 35 opções Z01-Z35
  const paySel = $('oxPayment');
  paySel.innerHTML = '<option value="">— Selecione —</option>' +
    ORDER_PAYMENT_OPTIONS.map(v => `<option value="${safeHtml(v)}"${v===cfg.payment?' selected':''}>${safeHtml(v)}</option>`).join('');

  // Tabela de Preço (input + datalist)
  $('oxPriceTable').value = cfg.priceTable || '';
  $('oxPriceTableList').innerHTML = ORDER_PRICE_TABLE_OPTIONS.map(v => `<option value="${safeHtml(v)}"></option>`).join('');

  // Campanha — select
  const campSel = $('oxCampaign');
  campSel.innerHTML = '<option value="">— Sem campanha —</option>' +
    ORDER_CAMPAIGN_OPTIONS.map(v => `<option value="${safeHtml(v)}"${v===cfg.campaign?' selected':''}>${safeHtml(v)}</option>`).join('');

  const fillSel = (id, list, val) => {
    $(id).innerHTML = list.map(v => `<option value="${safeHtml(v)}"${v===val?' selected':''}>${safeHtml(v)}</option>`).join('');
  };
  fillSel('oxPacking',      ORDER_PACKING_OPTIONS,  cfg.packing);
  fillSel('oxDeliveryType', ORDER_DELIVERY_OPTIONS, cfg.deliveryType);
  fillSel('oxDataFirme',    ORDER_YESNO_OPTIONS,    cfg.dataFirme);
  fillSel('oxPedidoMae',    ORDER_YESNO_OPTIONS,    cfg.pedidoMae);
  fillSel('oxAntecipacao',  ORDER_YESNO_OPTIONS,    cfg.antecipacao);

  $('oxPedidoCliente').value = cfg.pedidoCliente || '';

  // Limpa marcas de erro
  ['oxCommission','oxClientCode','oxPayment','oxPriceTable'].forEach(id => $(id)?.classList.remove('invalid'));
}

function getExportFormData(){

    commission:   $('oxCommission').value || '',
    clientCode:   $('oxClientCode').value || '',
    payment:      $('oxPayment').value    || '',
    priceTable:   $('oxPriceTable').value || '',
    campaign:     $('oxCampaign').value   || '',
    packing:      $('oxPacking').value    || '',

  };
}

function validateExportFields(){
  const fields = [
    { id:'oxCommission', label:'Comissionista' },
    { id:'oxClientCode', label:'Código Cliente' },
    { id:'oxPayment',    label:'Cond. Pagamento' },
    { id:'oxPriceTable', label:'Tab. de Preço' }
  ];
  ['oxCommission','oxClientCode','oxPayment','oxPriceTable'].forEach(id => $(id)?.classList.remove('invalid'));
  const missing = [];
  let firstEl = null;
  fields.forEach(f => {
    const el = $(f.id);
    if(!el) return;
    if(!(el.value||'').trim()){
      el.classList.add('invalid');
      missing.push(f.label);
      if(!firstEl) firstEl = el;
    }
  });
  let semData = 0;
  for(const it of STATE.cart.values()) if(!it.dataDesejada) semData++;
  if(semData > 0) missing.push(`Data desejada em ${semData} item(ns)`);
  return { missing, firstEl };
}

// Monta as linhas do XLSX no layout idêntico ao do projeto original
function buildOrderExportRows(cfg){
  const headers = ORDER_EXPORT_HEADERS.slice();
  const idx = Object.fromEntries(headers.map((h,i)=>[h,i]));
  const aoa = [headers];
  const pay = parsePaymentInfo(cfg.payment);
  const warnings = [];

  for(const it of STATE.cart.values()){
    const row = new Array(headers.length).fill('');
    const totalQty = getItemTotalQty(it);
    if(totalQty === 0) continue; // ignora itens sem nenhum tamanho marcado

    const corPedido = String(it.corCodigo || it.cor || '').trim().replace(/_/g,'/');
    const qtdCaixas = calcQtdCaixas(it, totalQty);

    row[idx['Nº']] = 1;
    row[idx['Comissionista']]       = cfg.commission;
    row[idx['Cliente']]             = cfg.clientCode;
    row[idx['Tabela de Preço']]     = cfg.priceTable;
    row[idx['Prazo Médio']]         = pay.prazoMedio;
    row[idx['Número de Parcelas']]  = pay.parcelas;
    row[idx['Campanha']]            = cfg.campaign ? extractLeadingCode(cfg.campaign, 5) : '';
    row[idx['Forma de Embalar']]    = extractLeadingToken(cfg.packing);
    row[idx['Tipo de Entrega']]     = Number(extractLeadingToken(cfg.deliveryType)) || extractLeadingToken(cfg.deliveryType);
    row[idx['Data Firme']]          = extractLeadingToken(cfg.dataFirme);
    row[idx['Pedido Mãe']]          = extractLeadingToken(cfg.pedidoMae);
    row[idx['Aceita Antecipação?']] = extractLeadingToken(cfg.antecipacao);

    // Data desejada: YYYY-MM-DD → DD/MM/YYYY
    if(it.dataDesejada){
      const [dy, dm, dd] = it.dataDesejada.split('-');
      const dataFmt = (dy&&dm&&dd) ? `${dd}/${dm}/${dy}` : it.dataDesejada;
      row[idx['Data Desejada']]      = dataFmt;
      row[idx['Data de Faturamento']]= dataFmt;
    }

    const pedidoEfetivo = (it.pedidoCliente||'').trim() || cfg.pedidoCliente || '';
    if(pedidoEfetivo) row[idx['Pedido do Cliente']] = pedidoEfetivo;

    row[idx['Artigo']]      = String(it.artigo||'').trim();
    row[idx['Descrição']]   = String(it.descricao||'').trim();
    row[idx['Cor']]         = corPedido;
    row[idx['Quantidade de Caixas']] = qtdCaixas;

    // Distribui tamanhos pelas colunas
    if(isSockCategory(it.categoria)){
      const sockCol = detectSockColumn(it);
      if(sockCol && idx[sockCol] !== undefined) row[idx[sockCol]] = totalQty;
      else warnings.push(`Meia sem faixa identificada: ${it.descricao||it.artigo}`);
    } else if(isAccessoryCategory(it.categoria)){
      row[idx['U']] = totalQty;
    } else if(it.gradePedido && Object.keys(it.gradePedido).length){
      for(const [tam, qty] of Object.entries(it.gradePedido)){
        const header = String(tam||'').trim().toUpperCase();
        if(idx[header] !== undefined) row[idx[header]] = Number(qty) || '';
        else warnings.push(`Tamanho sem coluna: ${it.descricao||it.artigo} — ${tam}`);
      }
    }

    row[idx['Total']] = totalQty;
    aoa.push(row);

    if(isFootwearCategory(it.categoria) && totalQty > 0 && totalQty % 6 !== 0){
      warnings.push(`Calçado fora do múltiplo de 6: ${it.descricao||it.artigo} — total ${totalQty}`);
    }
  }
  return { aoa, warnings };
}

function exportOrderXlsx(){
  if(STATE.cart.size === 0){ showToast('Sacola vazia','info'); return; }
  const { missing, firstEl } = validateExportFields();
  if(missing.length){
    const msg = missing.length === 1
      ? `Preencha: ${missing[0]}`
      : `Preencha ${missing.length} campos obrigatórios`;
    showToast(msg, 'error');
    if(firstEl){
      firstEl.scrollIntoView({behavior:'smooth', block:'center'});
      setTimeout(()=>firstEl.focus(), 280);
    }
    return;
  }

  const cfg = getExportFormData();
  saveExportCfg(cfg);

  const { aoa, warnings } = buildOrderExportRows(cfg);
  if(aoa.length <= 1){
    showToast('Nenhum item tem quantidade definida','error');
    return;
  }

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = ORDER_EXPORT_COLS;
  ws['!autofilter'] = { ref: `A1:BG${aoa.length}` };

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Pedido');

  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const stamp = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}`;
  const fileName = `pedido_${MARCA_ATIVA}_${stamp}.xlsx`;
  XLSX.writeFile(wb, fileName);

  fecharExport();
  showToast(`Pedido exportado: ${fileName}`, 'success');

  if(warnings.length){
    console.warn('Avisos do pedido:', warnings);
    showToast(`⚠️ ${warnings.length} aviso(s) — ver console`, 'info');
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
// Aplica identidade visual da marca ativa (header + acentos)
function aplicarIdentidadeMarca(){
  const info = MARCA_INFO[MARCA_ATIVA];
  if(!info) return;
  // Logo no header
  const img = $('brandLogoImg');
  if(img){ img.src = info.logo; img.alt = info.nome; }
  const logoBox = $('brandLogo');
  if(logoBox) logoBox.style.background = info.bgMarca;
  // Nome da marca
  if($('brandName')) $('brandName').textContent = info.nome;
  if($('brandNameCart')) $('brandNameCart').textContent = info.nome;
  // Cores de acento (sobrescreve as do :root em tempo de execução)
  document.documentElement.style.setProperty('--accent',       info.accent);
  document.documentElement.style.setProperty('--accent-light', info.accentLight);
  document.documentElement.style.setProperty('--brand',        info.brand);
  document.documentElement.style.setProperty('--pulse-color-strong', info.pulseRgba);
  // Título da aba
  document.title = `${info.nome} — Disponibilidades`;
}
aplicarIdentidadeMarca();
loadCartFromStorage();
atualizarFabContador();
loadData();
